# Versión 2 del render.yaml, con estructura separada

# Define los servicios de tu aplicación
services:
  # --- Servicio 1: La Aplicación Web (Flask/Gunicorn) ---
  - type: web
    name: clinica-odontologica
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn 'clinica:create_app()'" # Añadidas comillas para robustez
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: clinica-db
          property: connectionString
      - key: FLASK_APP
        value: clinica
      - key: FLASK_DEBUG
        value: "0"
    disks:
      - name: data-disk
        mountPath: /var/data/clinica
        sizeGB: 1

# Define las bases de datos de tu aplicación
databases:
  # --- Servicio 2: La Base de Datos PostgreSQL ---
  - name: clinica-db
    plan: free
    databaseName: clinica_db_prod # Nombre interno de la base de datos
    user: clinica_user          # Nombre de usuario para la base de datos
    postgresMajorVersion: 14
    region: ohio