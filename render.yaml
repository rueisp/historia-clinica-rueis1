services:
  # --- Servicio 1: La Aplicación Web (Flask/Gunicorn) ---
  - type: web
    name: historia-clinica-rueis1 # Puedes cambiar este nombre
    env: python
    plan: free # Usa el plan gratuito
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn clinica:create_app()"
    envVars:
      - key: SECRET_KEY
        generateValue: true # Render generará una clave secreta segura por ti
      - key: DATABASE_URL
        fromDatabase:
          name: clinica-db # El nombre de nuestro servicio de base de datos
          property: connectionString
      - key: FLASK_APP
        value: clinica # El nombre de tu paquete de aplicación
      - key: FLASK_DEBUG
        value: "0" # Desactivamos el modo debug en producción
    disks:
      - name: data-disk
        mountPath: /var/data/clinica # La ruta donde montaremos el disco
        sizeGB: 1 # El tamaño del disco persistente (1GB es suficiente y gratis)

  # --- Servicio 2: La Base de Datos PostgreSQL ---
  - type: psql
    name: clinica-db
    plan: free
    postgresMajorVersion: 14
    region: ohio # Puedes elegir la región más cercana a ti

  # --- Servicio 3: El Disco Persistente para las Imágenes ---
  # (Este disco se crea y se asocia en la sección 'disks' del servicio web)